apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ujwalnagrikar/backend:v1
        env:
        - name: MYSQL_HOST
          value: mysql
        - name: MYSQL_USER
          value: universe_user
        - name: MYSQL_PASSWORD
          value: universe_pass
        - name: MYSQL_DATABASE
          value: universe_capital
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
