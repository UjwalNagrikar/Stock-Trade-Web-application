# ============================================================
# nginx.conf — UNiverse Capital production server
#
# - Serves the Vite-built React SPA from /usr/share/nginx/html
# - Proxies all /api/* requests to the Flask API on port 5000
# - Gzip, cache headers, and basic security headers included
# ============================================================

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # ── Charset & mime types ────────────────────────────────────
    charset utf-8;

    # ── Gzip compression ────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ── Security headers ────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── API reverse proxy ───────────────────────────────────────
    # All /api/* traffic is forwarded to the Flask Gunicorn process.
    # In Docker Compose the upstream is 'api:5000'.
    # On a bare-metal deploy change to '127.0.0.1:5000'.
    location /api/ {
        proxy_pass         http://api:5000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Rate-limit headers from Flask are passed through automatically
    }

    # ── Static assets — long cache ──────────────────────────────
    # Vite outputs hashed filenames (e.g. main.abc123.js), so a
    # 1-year cache is safe for everything under /assets/.
    location /assets/ {
        root       /usr/share/nginx/html;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Favicon & manifest — short cache ───────────────────────
    location ~* \.(ico|svg|webmanifest|json)$ {
        root    /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── React SPA — root + client-side routing ──────────────────
    # Any path not matched above serves index.html so React Router
    # can handle the URL client-side.
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;

        # index.html must not be cached (so deploys take effect immediately)
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Hide nginx version ──────────────────────────────────────
    server_tokens off;
}