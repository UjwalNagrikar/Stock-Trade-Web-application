name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  DOCKER_USER: ujwalnagrikar
  FRONTEND_IMAGE: ujwalnagrikar/frontend
  BACKEND_IMAGE: ujwalnagrikar/backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Version
        run: echo "VERSION=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Images
        run: |
          docker build -t $FRONTEND_IMAGE:v$VERSION .
          docker build -t $BACKEND_IMAGE:v$VERSION ./backend

      - name: Push Docker Images
        run: |
          docker push $FRONTEND_IMAGE:v$VERSION
          docker push $BACKEND_IMAGE:v$VERSION

      - name: Deploy to Kubernetes via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=$HOME/.kube/config

            echo "Deploying version v$VERSION"

            kubectl get nodes

            kubectl set image deployment/frontend frontend=$FRONTEND_IMAGE:v$VERSION -n default
            kubectl set image deployment/backend backend=$BACKEND_IMAGE:v$VERSION -n default

            kubectl rollout status deployment/frontend -n default
            kubectl rollout status deployment/backend -n default
